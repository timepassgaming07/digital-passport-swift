name: SovereignTrust
options:
  bundleIdPrefix: com.sovereigntrust
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
configs:
  Debug: debug
  Release: release
settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "26.0"
  CODE_SIGN_STYLE: Automatic
  DEVELOPMENT_TEAM: ""
  MARKETING_VERSION: "2.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  SovereignTrust:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/SovereignTrust
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sovereigntrust.app
      INFOPLIST_FILE: Sources/SovereignTrust/Resources/Info.plist
      CODE_SIGN_ENTITLEMENTS: SovereignTrust/SovereignTrust.entitlements
    dependencies:
      - package: EFQRCode
        product: EFQRCode
packages:
  EFQRCode:
    url: https://github.com/EFPrefix/EFQRCode.git
    from: "6.2.1"
